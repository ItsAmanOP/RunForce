<!DOCTYPE html>

<html lang="en"><head><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Speed Tracker - UP Police 1600m</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neon-lime': '#80f20d',
            'obsidian-dark': '#0a0a0a',
            'surface-dark': '#1a1a1a',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          },
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 10px rgba(128, 242, 13, 0.4); }
      50% { text-shadow: 0 0 25px rgba(128, 242, 13, 0.8); }
    }
    .glow-text {
      animation: pulse-glow 2s infinite ease-in-out;
    }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.35s;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
  </style>
</head>
<body class="bg-obsidian-dark text-white font-sans antialiased overflow-hidden select-none">
<!-- BEGIN: MainContainer -->
<main class="flex flex-col h-screen w-full p-6 max-w-md mx-auto">
<!-- BEGIN: Header -->
<header class="flex justify-between mb-8 items-start" data-purpose="header">
<div class="flex flex-col"><div class="flex items-center space-x-1.5 mb-1 opacity-60">
<span class="material-symbols-outlined text-neon-lime text-lg">bolt</span>
<span class="text-[10px] font-black tracking-[0.2em] uppercase text-zinc-300">RunForce</span>
</div>
<span class="text-xs font-bold text-neon-lime uppercase tracking-widest">Active Session</span>
<h1 class="text-lg font-extrabold tracking-tight">UP Police - 1600m</h1>
</div>
<div class="bg-surface-dark px-3 py-1 rounded-custom border border-white/10 mt-1">
<span class="text-xs font-mono text-zinc-400">GPS: STRONG</span>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: PrimaryMetrics -->
<section class="flex-grow flex flex-col items-center justify-center space-y-12" data-purpose="tracking-display">
<!-- Distance Remaining (Large Glow) -->
<div class="text-center" data-purpose="distance-counter">
<p class="text-zinc-500 text-sm font-bold uppercase tracking-widest mb-1">Distance Left</p>
<div class="relative flex flex-col items-center">
<span class="text-8xl font-black text-neon-lime glow-text leading-none">840</span>
<span class="text-2xl font-bold text-neon-lime/80 mt-2">METERS</span>
</div>
</div>
<!-- Time Remaining -->
<div class="text-center" data-purpose="time-counter">
<p class="text-zinc-500 text-sm font-bold uppercase tracking-widest mb-1">Time Remaining</p>
<div class="text-5xl font-mono font-bold tracking-tighter tabular-nums">
          04:12.<span class="text-2xl text-zinc-400">45</span>
</div>
</div>
<!-- Pace Performance Indicator -->
<div class="w-full bg-surface-dark p-6 rounded-custom border border-neon-lime/20 flex flex-col items-center shadow-lg shadow-neon-lime/5" data-purpose="performance-indicator">
<div class="flex items-center space-x-2 mb-2">
<div class="w-2 h-2 rounded-full bg-neon-lime animate-ping"></div>
<span class="text-xs font-bold uppercase tracking-widest text-zinc-400">Status to Qualify</span>
</div>
<div class="flex items-center space-x-3">
<!-- Down Arrow Icon for "Behind" or Up for "Ahead" -->
<svg class="h-8 w-8 text-neon-lime" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
<span class="text-3xl font-black italic uppercase text-neon-lime tracking-tighter">Ahead of Target</span>
</div>
<p class="mt-3 text-zinc-400 text-sm font-medium">
          Current Pace: <span class="text-white">4'15"/km</span> | Required: <span class="text-white">4'30"/km</span>
</p>
</div>
</section>
<!-- END: PrimaryMetrics -->
<!-- BEGIN: SecondaryMetrics -->
<section class="grid grid-cols-2 gap-4 my-8" data-purpose="secondary-stats">
<div class="bg-surface-dark/50 p-4 rounded-custom border border-white/5 text-center">
<p class="text-[10px] text-zinc-500 font-bold uppercase">Average Speed</p>
<p class="text-xl font-bold">14.2 <span class="text-xs text-zinc-400">km/h</span></p>
</div>
<div class="bg-surface-dark/50 p-4 rounded-custom border border-white/5 text-center">
<p class="text-[10px] text-zinc-500 font-bold uppercase">Estimated Finish</p>
<p class="text-xl font-bold">06:45</p>
</div>
</section>
<!-- END: SecondaryMetrics -->
<!-- BEGIN: ActionControls -->
<footer class="mt-auto pb-6" data-purpose="session-controls">
<div class="flex items-center justify-between space-x-4">
<!-- Pause Button -->
<button class="flex-1 bg-surface-dark hover:bg-zinc-800 text-white font-bold py-5 rounded-custom border border-white/10 active:scale-95 transition-transform flex items-center justify-center space-x-2">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
</svg>
<span>PAUSE</span>
</button>
<!-- Stop Button (Long Press Sim) -->
<button class="h-16 w-16 bg-red-600/20 border-2 border-red-600 rounded-full flex items-center justify-center text-red-500 active:scale-95 transition-all">
<div class="w-6 h-6 bg-red-600 rounded-sm"></div>
</button>
</div>
<!-- Visual Progress Bar -->
<div class="w-full bg-zinc-800 h-1.5 mt-8 rounded-full overflow-hidden">
<div class="bg-neon-lime h-full w-[47%] shadow-[0_0_10px_#80f20d]"></div>
</div>
</footer>
<!-- END: ActionControls -->
</main>
<!-- END: MainContainer -->
<script data-purpose="ui-interactions">
    // Mock interaction for tactile feedback logic
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', () => {
        // Potential haptic feedback integration for mobile
      });
    });
  </script>
</body></html>
