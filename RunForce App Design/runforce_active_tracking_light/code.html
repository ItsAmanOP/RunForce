<!DOCTYPE html>

<html lang="en"><head>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Speed Tracker - UP Police 1600m (Light)</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neon-lime': '#80f20d',
            'obsidian-dark': '#0a0a0a',
            'surface-light': '#f8fafc',
            'border-light': '#e2e8f0',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          },
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 8px rgba(128, 242, 13, 0.3); }
      50% { text-shadow: 0 0 20px rgba(128, 242, 13, 0.6); }
    }
    .glow-text {
      animation: pulse-glow 2s infinite ease-in-out;
    }
    .grid-bg {
      background-image: linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="bg-white text-zinc-900 font-sans antialiased overflow-hidden select-none grid-bg">
<!-- BEGIN: MainContainer -->
<main class="flex flex-col h-screen w-full p-6 max-w-md mx-auto relative z-10">
<!-- BEGIN: Header -->
<header class="flex justify-between mb-8 items-start" data-purpose="header">
<div class="flex flex-col">
<div class="flex items-center space-x-2 mb-1">
<div class="w-7 h-7 bg-neon-lime rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-black text-lg font-bold">bolt</span>
</div>
<span class="text-sm font-black tracking-tighter uppercase text-zinc-900">RunForce</span>
</div>
<div class="flex items-center space-x-1.5 mt-1">
<div class="w-1.5 h-1.5 rounded-full bg-neon-lime animate-pulse"></div>
<span class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest">Active Session</span>
</div>
<h1 class="text-lg font-black tracking-tight text-zinc-900 mt-0.5">UP Police - 1600m</h1>
</div>
<div class="bg-white px-3 py-1.5 rounded-custom border border-zinc-200 shadow-sm mt-1">
<span class="text-[10px] font-bold text-zinc-500 tracking-wider">GPS: <span class="text-emerald-600">STRONG</span></span>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: PrimaryMetrics -->
<section class="flex-grow flex flex-col items-center justify-center space-y-10" data-purpose="tracking-display">
<!-- Distance Remaining -->
<div class="text-center" data-purpose="distance-counter">
<p class="text-zinc-400 text-xs font-black uppercase tracking-[0.2em] mb-1">Distance Left</p>
<div class="relative flex flex-col items-center">
<span class="text-8xl font-black text-neon-lime drop-shadow-sm glow-text leading-none" style="-webkit-text-stroke: 1px rgba(0,0,0,0.05);">840</span>
<span class="text-xl font-black text-zinc-900 mt-2 tracking-widest">METERS</span>
</div>
</div>
<!-- Time Remaining -->
<div class="text-center" data-purpose="time-counter">
<p class="text-zinc-400 text-xs font-black uppercase tracking-[0.2em] mb-1">Time Remaining</p>
<div class="text-5xl font-mono font-black tracking-tighter tabular-nums text-zinc-900">
          04:12.<span class="text-2xl text-zinc-400">45</span>
</div>
</div>
<!-- Pace Performance Indicator -->
<div class="w-full bg-white p-6 rounded-custom border border-zinc-200 flex flex-col items-center shadow-xl shadow-zinc-100" data-purpose="performance-indicator">
<div class="flex items-center space-x-2 mb-2">
<span class="text-[10px] font-black uppercase tracking-[0.15em] text-zinc-400">Status to Qualify</span>
</div>
<div class="flex items-center space-x-3">
<span class="material-symbols-outlined text-neon-lime text-4xl font-black">trending_up</span>
<span class="text-3xl font-black italic uppercase text-zinc-900 tracking-tighter">Ahead of Target</span>
</div>
<div class="mt-3 flex items-center space-x-2">
<p class="text-zinc-500 text-xs font-bold">
          Pace: <span class="text-zinc-900">4'15"/km</span>
</p>
<div class="w-1 h-1 rounded-full bg-zinc-300"></div>
<p class="text-zinc-500 text-xs font-bold">
          Required: <span class="text-zinc-900">4'30"/km</span>
</p>
</div>
</div>
</section>
<!-- END: PrimaryMetrics -->
<!-- BEGIN: SecondaryMetrics -->
<section class="grid grid-cols-2 gap-4 my-8" data-purpose="secondary-stats">
<div class="bg-white p-4 rounded-custom border border-zinc-200 text-center shadow-sm">
<p class="text-[10px] text-zinc-400 font-black uppercase tracking-wider">Average Speed</p>
<p class="text-xl font-black text-zinc-900">14.2 <span class="text-xs text-zinc-400">km/h</span></p>
</div>
<div class="bg-white p-4 rounded-custom border border-zinc-200 text-center shadow-sm">
<p class="text-[10px] text-zinc-400 font-black uppercase tracking-wider">Est. Finish</p>
<p class="text-xl font-black text-zinc-900">06:45</p>
</div>
</section>
<!-- END: SecondaryMetrics -->
<!-- BEGIN: ActionControls -->
<footer class="mt-auto pb-6" data-purpose="session-controls">
<div class="flex items-center justify-between space-x-4">
<!-- Pause Button -->
<button class="flex-1 bg-zinc-900 hover:bg-black text-white font-black py-5 rounded-custom border border-transparent active:scale-95 transition-all flex items-center justify-center space-x-2 shadow-lg shadow-zinc-200">
<span class="material-symbols-outlined text-2xl fill-current">pause</span>
<span class="tracking-widest">PAUSE</span>
</button>
<!-- Stop Button -->
<button class="h-16 w-16 bg-white border-2 border-red-500 rounded-full flex items-center justify-center text-red-500 active:scale-95 transition-all shadow-sm">
<div class="w-6 h-6 bg-red-500 rounded-sm"></div>
</button>
</div>
<!-- Visual Progress Bar -->
<div class="w-full bg-zinc-100 h-2.5 mt-8 rounded-full overflow-hidden border border-zinc-200">
<div class="bg-neon-lime h-full w-[47%] relative">
<div class="absolute inset-0 bg-white/30 animate-pulse"></div>
</div>
</div>
</footer>
<!-- END: ActionControls -->
</main>
<!-- END: MainContainer -->
<script data-purpose="ui-interactions">
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', () => {
        // Haptic feedback logic
      });
    });
  </script>
</body></html>
