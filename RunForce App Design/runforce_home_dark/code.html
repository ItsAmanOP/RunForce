<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>RunForce | Speed Tracker 2026</title>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- BEGIN: Tailwind Configuration -->
<script>
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                brand: '#80f20d',
                cyber: {
                  black: '#0a0a0a',
                  dark: '#121212',
                  gray: '#1c1c1c',
                  light: '#2a2a2a'
                }
              },
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
              },
              borderRadius: {
                'custom': '8px',
              },
              boxShadow: {
                'neon': '0 0 15px rgba(128, 242, 13, 0.4)',
                'neon-strong': '0 0 25px rgba(128, 242, 13, 0.6)',
              }
            }
          }
        }

<!-- END: Tailwind Configuration -->
<style data-purpose="custom-animations">
        @keyframes pulse-glow {
          0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px #80f20d); }
          50% { opacity: 0.8; filter: drop-shadow(0 0 20px #80f20d); }
        }
        .animate-neon-pulse {
          animation: pulse-glow 3s infinite ease-in-out;
        }
        .grid-bg {
          background-image: linear-gradient(rgba(128, 242, 13, 0.05) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(128, 242, 13, 0.05) 1px, transparent 1px);
          background-size: 20px 20px;
        }
        .scanline {
          width: 100%;
          height: 2px;
          background: rgba(128, 242, 13, 0.1);
          position: absolute;
          top: 0;
          left: 0;
          animation: scan 8s linear infinite;
          pointer-events: none;
        }
        @keyframes scan {
          from { top: 0%; }
          to { top: 100%; }
        }
        .gauge-container {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gauge-svg {
            transform: rotate(-90deg);
        }
        .gauge-track {
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 12;
            fill: none;
        }
        .gauge-progress {
            stroke: #80f20d;
            stroke-width: 12;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 565.48; /* 2 * PI * 90 */
            stroke-dashoffset: 282.74; /* Example: 50% */
            filter: drop-shadow(0 0 8px rgba(128, 242, 13, 0.8));
            transition: stroke-dashoffset 1s ease-out;
        }

<!-- BEGIN: Canvas Graphing Logic -->
<script data-purpose="canvas-renderer">
    function drawTrend() {
      const canvas = document.getElementById('trendCanvas');
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const points = [
        {x: 0, y: 60},
        {x: 40, y: 50},
        {x: 80, y: 70},
        {x: 120, y: 40},
        {x: 160, y: 55},
        {x: 200, y: 30},
        {x: 240, y: 45},
        {x: 280, y: 20},
        {x: 340, y: 10}
      ];

      const scaleX = rect.width / 340;

      ctx.beginPath();
      ctx.moveTo(points[0].x * scaleX, points[0].y);
      
      for (let i = 0; i < points.length - 1; i++) {
        const xc = (points[i].x * scaleX + points[i + 1].x * scaleX) / 2;
        const yc = (points[i].y + points[i + 1].y) / 2;
        ctx.quadraticCurveTo(points[i].x * scaleX, points[i].y, xc, yc);
      }

      ctx.strokeStyle = '#80f20d';
      ctx.lineWidth = 3;
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#80f20d';
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.lineTo(rect.width, rect.height);
      ctx.lineTo(0, rect.height);
      ctx.closePath();
      
      const gradient = ctx.createLinearGradient(0, 0, 0, rect.height);
      gradient.addColorStop(0, 'rgba(128, 242, 13, 0.2)');
      gradient.addColorStop(1, 'rgba(128, 242, 13, 0)');
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    window.addEventListener('load', drawTrend);
    window.addEventListener('resize', drawTrend);
</script>
<!-- END: Canvas Graphing Logic -->
</body></html>
